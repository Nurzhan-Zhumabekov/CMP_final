name: coffee_shop
description: "Coffee Shop Flutter application built with Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  chopper: ^8.0.3

  # JSON Serialization
  json_annotation: ^4.9.0

  # Local Storage — Drift (SQLite)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Lightweight Settings
  shared_preferences: ^2.3.3

  # Firebase
  firebase_core: ^3.9.0
  cloud_firestore: ^5.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  chopper_generator: ^8.0.3
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true
